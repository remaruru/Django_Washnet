{% extends 'base_auth.html' %}

{% block title %}Complete Profile - WASHNET{% endblock %}

{% block content %}
<div style="width: 100%; max-width: 500px; text-align: center;">

    <!-- Header Logo -->
    <a href="{% url 'home' %}" style="display: inline-flex; align-items: center; gap: var(--space-2); text-decoration: none; margin-bottom: var(--space-8); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #A78BFA, #7C3AED); display: flex; align-items: center; justify-content: center; box-shadow: 12px 12px 24px #d1cddb, -12px -12px 24px #ffffff; color: white;">
            <i data-feather="droplet" style="width: 28px; height: 28px;"></i>
        </div>
    </a>

    <div style="margin-bottom: var(--space-8);">
        <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: var(--text-xs); font-weight: 800; color: var(--primary); margin-bottom: var(--space-2);">One Last Step</p>
        <h1 style="font-size: var(--text-4xl); font-weight: 900; color: var(--text-main); margin-bottom: var(--space-2); letter-spacing: -0.03em; font-family: 'Nunito', sans-serif;">Complete Profile</h1>
        <p style="color: var(--text-muted); font-weight: 600; font-size: var(--text-base);">We need a few more details to ensure your laundry deliveries go smoothly.</p>
    </div>

    <div class="clay-auth-card" style="text-align: left; padding: var(--space-8);">
        <form method="POST" action="{% url 'complete_profile' %}">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: var(--space-5);">
                <label for="phone_number" class="form-label" style="font-weight: 800; color: var(--text-main); margin-bottom: var(--space-3);">Phone Number <span style="color: var(--error);">*</span></label>
                <input type="tel" id="phone_number" name="phone_number" class="clay-auth-input" style="font-weight: 600;" placeholder="0917..." required autocomplete="tel">
            </div>

            <div class="form-group" style="margin-bottom: var(--space-5);">
                <label for="address" class="form-label" style="font-weight: 800; color: var(--text-main); margin-bottom: var(--space-3);">Delivery Address <span style="color: var(--error);">*</span></label>
                <textarea id="address" name="address" class="clay-auth-input" style="font-weight: 600;" rows="2" placeholder="Full address for rider logistics" required></textarea>
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-8);">
                <label for="delivery_notes" class="form-label" style="font-weight: 800; color: var(--text-main); margin-bottom: var(--space-3);">Address Notes / Landmark (Optional)</label>
                <textarea id="delivery_notes" name="delivery_notes" class="clay-auth-input" style="font-weight: 600;" rows="2" placeholder="Nearby landmarks, gate color, etc."></textarea>
            </div>

            <button type="submit" class="clay-auth-btn" style="width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 900; letter-spacing: 0.02em;">
                Save and Continue <i data-feather="check-circle" style="width: 18px; height: 18px;"></i>
            </button>
        </form>
    </div>

</div>
{% endblock %}
