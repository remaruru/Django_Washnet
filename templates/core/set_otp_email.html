{% extends 'base_auth.html' %}
{% load static %}

{% block title %}Set 2FA Email - WASHNET{% endblock %}

{% block content %}
<div style="width: 100%; max-width: 440px; text-align: center;">

    <a href="{% url 'admin_settings' %}" style="display: inline-flex; align-items: center; gap: var(--space-2); text-decoration: none; margin-bottom: var(--space-8); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669); display: flex; align-items: center; justify-content: center; box-shadow: 12px 12px 24px #d1cddb, -12px -12px 24px #ffffff; color: white;">
            <i data-feather="mail" style="width: 28px; height: 28px;"></i>
        </div>
    </a>

    <div style="margin-bottom: var(--space-8);">
        <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: var(--text-xs); font-weight: 800; color: #059669; margin-bottom: var(--space-2);">Security Settings</p>
        <h1 style="font-size: var(--text-3xl); font-weight: 900; color: var(--text-main); margin-bottom: var(--space-2); letter-spacing: -0.03em; font-family: 'Nunito', sans-serif;">Set 2FA Email</h1>
        <p style="color: var(--text-muted); font-weight: 600; font-size: var(--text-base);">Enter the email address where your secure login codes should be sent.</p>
    </div>

    <div class="clay-auth-card" style="text-align: left; padding: var(--space-8);">
        <form method="POST" action="{% url 'save_otp_email' %}">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: var(--space-6);">
                <label for="new_email" class="form-label" style="font-weight: 800; color: var(--text-main); margin-bottom: var(--space-3); display: block;">Email Address</label>
                <input type="email" id="new_email" name="new_email" class="clay-auth-input" style="font-weight: 600;" placeholder="admin@washnet.app" required autofocus>
            </div>

            <button type="submit" class="clay-auth-btn" style="width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 900; letter-spacing: 0.02em; background: linear-gradient(135deg, #10b981, #059669); color: white;">
                Save Security Settings <i data-feather="check" style="width: 18px; height: 18px;"></i>
            </button>
            <a href="{% url 'admin_settings' %}" style="display: block; text-align: center; margin-top: var(--space-4); color: var(--text-muted); font-size: 13px; font-weight: 700; text-decoration: none;">Cancel</a>
        </form>
    </div>

</div>
{% endblock %}
