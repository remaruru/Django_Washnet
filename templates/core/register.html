{% extends 'base_auth.html' %}

{% block title %}Sign up - WASHNET{% endblock %}

{% block content %}
<div style="width: 100%; max-width: 600px; text-align: center;">

    <!-- Header Logo -->
    <a href="{% url 'home' %}" style="display: inline-flex; align-items: center; gap: var(--space-2); text-decoration: none; margin-bottom: var(--space-8); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #A78BFA, #7C3AED); display: flex; align-items: center; justify-content: center; box-shadow: 12px 12px 24px #d1cddb, -12px -12px 24px #ffffff; color: white;">
            <i data-feather="droplet" style="width: 28px; height: 28px;"></i>
        </div>
    </a>

    <div style="margin-bottom: 3rem;">
        <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: var(--text-xs); font-weight: 800; color: var(--primary); margin-bottom: var(--space-3);">Start Your Journey</p>
        <h1 style="font-size: var(--text-4xl); font-weight: 900; color: #1E293B; margin-bottom: var(--space-2); letter-spacing: -0.03em; font-family: 'Nunito', sans-serif;">Create your account</h1>
        <p style="color: #475569; font-weight: 600; font-size: 1.05rem;">Join Washnet and experience elite laundry management.</p>
    </div>

    <div class="clay-auth-card" style="text-align: left; padding: 2.5rem 2rem;">
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); margin-bottom: var(--space-6);">
                <div class="form-group" style="margin: 0;">
                    <label for="username" class="form-label" style="font-weight: 800; color: #334155; margin-bottom: var(--space-3);">Username</label>
                    <input type="text" id="username" name="username" class="clay-auth-input" style="font-weight: 600;" placeholder="Choose username" required autocomplete="username">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label for="email" class="form-label" style="font-weight: 800; color: #334155; margin-bottom: var(--space-3);">Email Address</label>
                    <input type="email" id="email" name="email" class="clay-auth-input" style="font-weight: 600;" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); margin-bottom: var(--space-6);">
                <div class="form-group" style="margin: 0;">
                    <label for="phone_number" class="form-label" style="font-weight: 800; color: #334155; margin-bottom: var(--space-3);">Phone Number</label>
                    <input type="tel" id="phone_number" name="phone_number" class="clay-auth-input" style="font-weight: 600;" placeholder="0917..." required autocomplete="tel">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label for="password" class="form-label" style="font-weight: 800; color: #334155; margin-bottom: var(--space-3);">Password</label>
                    <input type="password" id="password" name="password" class="clay-auth-input" style="font-weight: 600;" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: var(--space-6);">
                <label for="address" class="form-label" style="font-weight: 800; color: #334155; margin-bottom: var(--space-3);">Delivery Address</label>
                <textarea id="address" name="address" class="clay-auth-input" style="font-weight: 600;" rows="2" placeholder="Full address for rider logistics" required></textarea>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="clay-auth-btn" style="width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 900; letter-spacing: 0.02em;">
                    Create Account <i data-feather="arrow-right" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
        </form>
    </div>

    <div style="margin-top: 2.5rem; text-align: center;">
        <p style="font-size: 0.9375rem; font-weight: 600; color: #334155; margin: 0;">
            Already have an account? 
            <a href="{% url 'login' %}" style="font-weight: 900; color: var(--primary); text-decoration: none; margin-left: 6px; padding-bottom: 2px; border-bottom: 2px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='transparent'">Log in instead</a>
        </p>
    </div>
</div>
{% endblock %}
