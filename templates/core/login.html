{% extends 'base_auth.html' %}

{% block title %}Log in - WASHNET{% endblock %}

{% block content %}
<div style="width: 100%; max-width: 440px; text-align: center;">
    
    <!-- Header Logo -->
    <a href="{% url 'home' %}" style="display: inline-flex; align-items: center; gap: var(--space-2); text-decoration: none; margin-bottom: var(--space-8); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #A78BFA, #7C3AED); display: flex; align-items: center; justify-content: center; box-shadow: 12px 12px 24px #d1cddb, -12px -12px 24px #ffffff; color: white;">
            <i data-feather="droplet" style="width: 28px; height: 28px;"></i>
        </div>
    </a>

    <div style="margin-bottom: var(--space-8);">
        <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: var(--text-xs); font-weight: 800; color: var(--primary); margin-bottom: var(--space-2);">Welcome Back</p>
        <h1 style="font-size: var(--text-4xl); font-weight: 900; color: var(--text-main); margin-bottom: var(--space-2); letter-spacing: -0.03em; font-family: 'Nunito', sans-serif;">Log in to Washnet</h1>
        <p style="color: var(--text-muted); font-weight: 600; font-size: var(--text-base);">Enter your credentials to access your workspace.</p>
    </div>

    <div class="clay-auth-card" style="text-align: left; padding: var(--space-12) var(--space-8);">
        <form method="POST" action="{% url 'login' %}" id="loginForm" novalidate>
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: var(--space-6);">
                <label for="username" class="form-label" style="font-weight: 800; color: var(--text-main); margin-bottom: var(--space-3);">Username</label>
                <input type="text" id="username" name="username" class="clay-auth-input" style="font-weight: 600;" placeholder="your_username" autocomplete="username" autofocus>
                <span id="username-err" style="display:none; color:#DC2626; font-size:0.8rem; font-weight:700; margin-top:4px; display:none;"></span>
            </div>

            <div class="form-group" style="margin-bottom: var(--space-8);">
                <div style="margin-bottom: var(--space-3);">
                    <label for="password" class="form-label" style="margin: 0; font-weight: 800; color: var(--text-main);">Password</label>
                </div>
                <input type="password" id="password" name="password" class="clay-auth-input" style="font-weight: 600;" placeholder="••••••••" autocomplete="current-password">
                <span id="password-err" style="display:none; color:#DC2626; font-size:0.8rem; font-weight:700; margin-top:4px;"></span>
            </div>

            <button type="submit" class="clay-auth-btn" style="width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 900; letter-spacing: 0.02em;">
                Log In <i data-feather="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            let valid = true;

            function showErr(id, msg) {
                const el = document.getElementById(id);
                el.textContent = msg;
                el.style.display = 'block';
            }
            function clearErr(id) {
                const el = document.getElementById(id);
                el.textContent = '';
                el.style.display = 'none';
            }

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            clearErr('username-err');
            clearErr('password-err');

            if (!username) {
                showErr('username-err', 'Username is required.');
                valid = false;
            }
            if (!password) {
                showErr('password-err', 'Password is required.');
                valid = false;
            }

            if (!valid) e.preventDefault();
        });
        </script>

        <div style="margin: var(--space-6) 0; display: flex; align-items: center; text-align: center; color: var(--text-muted);">
            <div style="flex: 1; height: 1px; background-color: #E2E8F0;"></div>
            <span style="font-size: var(--text-sm); font-weight: 700; margin: 0 var(--space-4);">or</span>
            <div style="flex: 1; height: 1px; background-color: #E2E8F0;"></div>
        </div>

        <a href="{% url 'google_login' %}" style="text-decoration: none;">
            <button type="button" class="clay-auth-btn" style="width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; background: white; color: #334155; border: 2px solid #E2E8F0; box-shadow: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
        </a>
    </div>

    <p style="font-size: var(--text-sm); font-weight: 600; color: var(--text-muted); margin-top: var(--space-12);">
        New to the platform? 
        <a href="{% url 'register' %}" style="font-weight: 900; color: var(--primary); text-decoration: none; margin-left: 4px; border-bottom: 2px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='transparent'">Create an account</a>
    </p>
</div>
{% endblock %}
