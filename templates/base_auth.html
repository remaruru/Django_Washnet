{% extends 'base_core.html' %}
{% load static %}

{% block body_class %}auth-layout{% endblock %}

{% block layout %}
    <!-- Claymorphism Blob Canvas -->
    <div style="position: absolute; top: 0; left: 0; width: 300px; height: 300px; background: #d8b4fe; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.15; pointer-events: none;"></div>
    <div style="position: absolute; top: 20%; right: 0; width: 300px; height: 300px; background: #93c5fd; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.15; pointer-events: none;"></div>
    <div style="position: absolute; bottom: 0; left: 20%; width: 400px; height: 400px; background: #f9a8d4; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.15; pointer-events: none;"></div>

    <div style="position: relative; z-index: 10; min-height: 100vh; display: grid; place-items: center; padding: 2rem;">
        <main style="display: flex; align-items: center; justify-content: center; width: 100%;">
            {% block content %}{% endblock %}
        </main>
    </div>
{% endblock %}
