services:
  - type: web
    name: washnet-pos
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn laundry_pos.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: washnet-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in the Render dashboard

databases:
  - name: washnet-db
    plan: free
    databaseName: washnet
    user: washnet_user
